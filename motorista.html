<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Ordem de Serviço · Motorista</title>
<style>
:root{--bg:#f8f0dd;--card:#fffdf6;--text:#2a1a0f;--text2:#6b5a48;--text3:#9b8a76;--accent:#db6a1d;--border:#e7dcc4;--ok:#2a7a40;--bad:#b03020}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 14px 40px}
.wrap{width:100%;max-width:560px;margin:0 auto}
.top{text-align:center;margin-bottom:16px}
.top img{width:74px;height:74px;object-fit:contain}
.top h1{font-size:16px;font-weight:800;margin-top:4px}
.top .sub{font-size:12px;color:var(--text3)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.sec{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.ro{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.ro:last-child{border-bottom:none}
.ro .k{color:var(--text3);flex-shrink:0}
.ro .v{font-weight:600;text-align:right;word-break:break-word}
label.fl{display:block;font-size:12.5px;font-weight:600;color:var(--text2);margin:10px 0 5px}
.inp{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;font-size:16px;font-family:inherit;color:var(--text);outline:none;min-height:52px}
.inp:focus{border-color:var(--accent)}
.g2{display:flex;gap:10px}.g2>div{flex:1;min-width:0}
.wrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wrow .wn{flex:1;font-size:13.5px;font-weight:600}
.wrow .inp{width:130px;min-height:46px;padding:10px;text-align:right}
.sig-wrap{margin-top:6px}
.sig{width:100%;height:150px;background:#fff;border:1.5px dashed var(--border);border-radius:10px;touch-action:none;display:block}
.sig-clear{background:none;border:none;color:var(--accent);font-size:12.5px;font-weight:700;padding:6px 0;cursor:pointer}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:17px;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;margin-top:6px}
.btn:disabled{opacity:.6}
.msg{text-align:center;padding:34px 16px}
.msg .ic{font-size:44px;margin-bottom:12px}
.msg .t{font-size:19px;font-weight:800;margin-bottom:8px}
.msg .s{font-size:14px;color:var(--text2);line-height:1.55}
.skel{height:16px;background:var(--border);border-radius:6px;opacity:.5;margin:14px 0}
.foot{text-align:center;font-size:11px;color:var(--text3);margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <img src="logo.png" onerror="this.onerror=null;this.src='icon-192.png'" alt="Cerrado">
    <h1>Ordem de Serviço</h1>
    <div class="sub">Preenchimento do motorista</div>
  </div>
  <div id="content"><div class="card"><div class="skel" style="width:50%"></div><div class="skel" style="width:90%"></div><div class="skel" style="width:70%"></div></div></div>
  <div class="foot">Cerrado Transportes e Soluções Ambientais</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
var FB_CONFIG={apiKey:"AIzaSyDzPZMZ0tP0dYDzfaFR1fm6Thx6ir4K76Q",authDomain:"residuospro---cerrado.firebaseapp.com",projectId:"residuospro---cerrado",storageBucket:"residuospro---cerrado.firebasestorage.app",messagingSenderId:"849223957541",appId:"1:849223957541:web:002d832603cb7ab75cd3cc"};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
function getParam(n){return new URLSearchParams(location.search).get(n);}
function brData(d){if(!d)return '—';var p=(''+d).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function msg(ic,t,s){el('content').innerHTML='<div class="card"><div class="msg"><div class="ic">'+ic+'</div><div class="t">'+t+'</div><div class="s">'+s+'</div></div></div>';}
var WASTE_DEF=['Papel e papelão','Sucata','Madeira','Plástico','Orgânico','Isopor','Contaminado de óleo','RCC','Terra contaminada','Lâmpadas','Eletrônicos'];
// máscara de hora HH:MM só por digitação (sem relógio nativo)
function maskHora(el){var v=el.value.replace(/\D/g,'').slice(0,4);if(v.length>=3)v=v.slice(0,2)+':'+v.slice(2);el.value=v;}
// avaliação segura de peso, aceitando + - * / (ex.: 20+15)
function evalPeso(val){if(val==null)return 0;var s=(''+val).replace(/,/g,'.').replace(/[^0-9+\-*/.() ]/g,'');if(!s)return 0;try{var r=Function('"use strict";return('+s+')')();return (isNaN(r)||!isFinite(r))?0:r;}catch(e){return parseFloat(s)||0;}}

// --- assinatura por toque ---
function initSig(canvas){
  var ctx=canvas.getContext('2d'), draw=false, last=null, dirty=false;
  function resize(){var r=canvas.getBoundingClientRect();canvas.width=r.width*2;canvas.height=r.height*2;ctx.scale(2,2);ctx.lineWidth=2.2;ctx.lineCap='round';ctx.strokeStyle='#2a1a0f';}
  resize();
  function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};}
  function start(e){e.preventDefault();draw=true;last=pos(e);}
  function move(e){if(!draw)return;e.preventDefault();var p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;dirty=true;}
  function end(){draw=false;}
  canvas.addEventListener('pointerdown',start);canvas.addEventListener('pointermove',move);
  canvas.addEventListener('pointerup',end);canvas.addEventListener('pointerleave',end);
  return {clear:function(){ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;},isEmpty:function(){return !dirty;},data:function(){return dirty?canvas.toDataURL('image/png'):'';}};
}
var sigMot=null, sigResp=null;

(function(){
  var token=getParam('token');
  if(!token){ msg('🔒','Link inválido','Este endereço não tem código de acesso. Peça um novo link.'); return; }
  try{ if(!firebase.apps||!firebase.apps.length) firebase.initializeApp(FB_CONFIG); }catch(e){}
  var db; try{ db=firebase.firestore(); }catch(e){ msg('⚠️','Não foi possível abrir','Tente de novo em instantes.'); return; }
  db.collection('os_tokens').doc(token).get().then(function(doc){
    if(!doc.exists){ msg('🔒','Link inválido','Esta Ordem de Serviço não existe ou foi removida.'); return; }
    var d=doc.data()||{};
    if(Number(d.expiraMs)&&Date.now()>Number(d.expiraMs)){ msg('⏳','Link expirado','Peça um novo link ao escritório.'); return; }
    if(d.status&&d.status!=='pendente'){ msg('✅','Já enviado','Os dados desta coleta já foram enviados. Obrigado!'); return; }
    render(token, d);
  }).catch(function(e){ console.error(e); msg('⚠️','Não foi possível abrir','Verifique o link ou tente mais tarde.'); });
})();

function render(token, d){
  var s=d.snapshot||{}, wl=Array.isArray(d.residuos)&&d.residuos.length?d.residuos:WASTE_DEF;
  function ro(k,v){return v?('<div class="ro"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>'):'';}
  var pre='<div class="card"><div class="sec">Dados da coleta</div>'+
    ro('Gerador',s.gerador)+ro('CNPJ',s.cnpj)+ro('Endereço',s.local)+ro('Destinador',s.destinador)+
    ro('Resíduo',s.residuo)+ro('Data',brData(s.dataColeta))+ro('MTR',s.mtr)+ro('Transportador',s.transportador)+ro('Veículo',s.veiculo)+'</div>';
  var wrows=wl.map(function(w,i){return '<div class="wrow"><div class="wn">'+esc(w)+'</div><input class="inp peso" data-w="'+esc(w)+'" type="text" inputmode="text" placeholder="kg (ex.: 20+15)"></div>';}).join('');
  var form='<div class="card"><div class="sec">Horários e KM</div>'+
      '<div class="g2"><div><label class="fl">Hora saída</label><input class="inp" type="text" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="maskHora(this)" id="f-hs"></div><div><label class="fl">Hora chegada</label><input class="inp" type="text" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="maskHora(this)" id="f-hc"></div></div>'+
      '<div class="g2"><div><label class="fl">Início serviço</label><input class="inp" type="text" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="maskHora(this)" id="f-is"></div><div><label class="fl">Fim serviço</label><input class="inp" type="text" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="maskHora(this)" id="f-fs"></div></div>'+
      '<div class="g2"><div><label class="fl">KM saída</label><input class="inp" type="number" inputmode="numeric" id="f-kms"></div><div><label class="fl">KM volta</label><input class="inp" type="number" inputmode="numeric" id="f-kmv"></div></div>'+
    '</div>'+
    '<div class="card"><div class="sec">Peso na balança (kg)</div>'+wrows+'</div>'+
    '<div class="card"><div class="sec">Observações</div><textarea class="inp" id="f-obs" rows="3" placeholder="Opcional"></textarea></div>'+
    '<div class="card"><div class="sec">Assinaturas</div>'+
      '<label class="fl">Motorista</label><div class="sig-wrap"><canvas class="sig" id="sig-mot"></canvas><button class="sig-clear" onclick="sigMot.clear()">Limpar</button></div>'+
      '<label class="fl">Responsável no local</label><div class="sig-wrap"><canvas class="sig" id="sig-resp"></canvas><button class="sig-clear" onclick="sigResp.clear()">Limpar</button></div>'+
    '</div>'+
    '<button class="btn" id="f-enviar">Enviar Ordem de Serviço</button>';
  el('content').innerHTML=pre+form;
  sigMot=initSig(el('sig-mot')); sigResp=initSig(el('sig-resp'));
  el('f-enviar').onclick=function(){ enviar(token); };
}

function enviar(token){
  var btn=el('f-enviar'); btn.disabled=true; btn.textContent='Enviando…';
  var pesos={}; Array.prototype.forEach.call(document.querySelectorAll('.peso'),function(i){var n=evalPeso(i.value);if(n>0)pesos[i.getAttribute('data-w')]=n;});
  var exec={horaSaida:el('f-hs').value||'',horaChegada:el('f-hc').value||'',inicioServico:el('f-is').value||'',fimServico:el('f-fs').value||'',
    kmSaida:el('f-kms').value||'',kmVolta:el('f-kmv').value||'',pesos:pesos,obs:el('f-obs').value||'',
    assinaturaMotorista:sigMot?sigMot.data():'',assinaturaResponsavel:sigResp?sigResp.data():'',submittedMs:Date.now()};
  var db=firebase.firestore();
  db.collection('os_tokens').doc(token).update({execucao:exec,status:'enviado',submittedMs:Date.now()}).then(function(){
    msg('✅','Enviado com sucesso!','Os dados da coleta foram registrados. Pode fechar esta página. Obrigado!');
  }).catch(function(e){ console.error(e); btn.disabled=false; btn.textContent='Enviar Ordem de Serviço'; alert('Não foi possível enviar. Verifique a internet e tente de novo.'); });
}
</script>
</body>
</html>
